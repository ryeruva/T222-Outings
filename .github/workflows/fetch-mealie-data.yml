name: Fetch Mealie Data

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Mealie data
        env:
          MEALIE_TOKEN: ${{ secrets.MEALIE_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, urllib.error, os, sys

          BASE  = "https://t222-mealplan.up.railway.app"
          TOKEN = os.environ.get("MEALIE_TOKEN", "")

          if not TOKEN:
              print("ERROR: MEALIE_TOKEN secret is not set.")
              sys.exit(1)

          def get(path):
              req = urllib.request.Request(
                  f"{BASE}{path}",
                  headers={"Authorization": f"Bearer {TOKEN}", "Accept": "application/json"}
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print(f"HTTP {e.code} on {path}: {body[:300]}")
                  raise

          os.makedirs("data", exist_ok=True)

          # ── Mt Tallac meal plan (May 8-10 2026) with full recipe details ──
          plan = get("/api/households/mealplans?startDate=2026-05-08&endDate=2026-05-10&perPage=50")
          for entry in plan.get("items", []):
              slug = (entry.get("recipe") or {}).get("slug")
              if slug:
                  try:
                      entry["_recipe"] = get(f"/api/recipes/{slug}")
                  except Exception:
                      entry["_recipe"] = None
              else:
                  entry["_recipe"] = None
          json.dump(plan, open("data/mt_tallac.json", "w"), indent=2)
          print(f"Mt Tallac: {len(plan.get('items', []))} meal plan entries saved")

          # ── All recipes for Grubmaster Hub ──
          recipes = get("/api/recipes?perPage=200&orderDirection=asc")
          json.dump(recipes, open("data/grubmaster.json", "w"), indent=2)
          print(f"Grubmaster: {len(recipes.get('items', []))} recipes saved")

          # ── Full year meal plans for Grubmaster Hub date picker ──
          mealplans = get("/api/households/mealplans?startDate=2026-01-01&endDate=2026-12-31&perPage=365")
          json.dump(mealplans, open("data/mealplans.json", "w"), indent=2)
          print(f"Meal plans: {len(mealplans.get('items', []))} entries saved")
          PYEOF

      - name: Fetch TroopTrack calendar
        run: |
          python3 - <<'PYEOF'
          import urllib.request, re, json, os
          from datetime import datetime, timezone

          ICS_URL = "https://t222.trooptrack.com/troops/0C94nGo-CCWEzH_Xf73YRA/calendar"

          with urllib.request.urlopen(ICS_URL) as r:
              raw = r.read().decode("utf-8")

          def unfold(text):
              return re.sub(r'\r?\n[ \t]', '', text)

          def parse_dt(val):
              val = re.sub(r';TZID=[^:]+:', '', val)
              val = val.replace('Z', '').strip()
              for fmt in ('%Y%m%dT%H%M%S', '%Y%m%d'):
                  try:
                      return datetime.strptime(val, fmt).isoformat()
                  except ValueError:
                      continue
              return val

          def field(block, key):
              m = re.search(rf'^{key}(?:;[^:]*)?:(.+)$', block, re.MULTILINE)
              return m.group(1).strip() if m else ''

          raw = unfold(raw)
          events = []
          for block in re.findall(r'BEGIN:VEVENT(.*?)END:VEVENT', raw, re.DOTALL):
              summary  = field(block, 'SUMMARY').replace('\\,', ',').replace('\\n', ' ')
              location = field(block, 'LOCATION').replace('\\,', ',')
              desc     = field(block, 'DESCRIPTION').replace('\\,', ',').replace('\\n', '\n').strip()
              uid      = field(block, 'UID')
              start    = parse_dt(field(block, 'DTSTART'))
              end      = parse_dt(field(block, 'DTEND'))
              events.append({
                  "uid": uid,
                  "summary": summary,
                  "start": start,
                  "end": end,
                  "location": location,
                  "description": desc,
              })

          events.sort(key=lambda e: e["start"])
          out = {"fetched": datetime.now(timezone.utc).isoformat(), "events": events}
          json.dump(out, open("data/calendar.json", "w"), indent=2)
          print(f"TroopTrack: {len(events)} events saved")
          PYEOF

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mt_tallac.json data/grubmaster.json data/mealplans.json data/calendar.json
          git diff --staged --quiet || git commit -m "chore: refresh Mealie data [skip ci]"
          git push
